services:
  db:
    image: postgres:16-alpine
    container_name: market-watch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_watch}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-market_watch}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - market_watch_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: market-watch-api
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@db:5432/market_watch}
    volumes:
      - .:/app
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - market_watch_network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: market-watch-worker
    working_dir: /app
    command: python -m app.workers.runner
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:postgres@db:5432/market_watch}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - market_watch_network

volumes:
  postgres_data:

networks:
  market_watch_network:
    driver: bridge